<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marketron - Campaign Preview</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 40px; text-align: center; }
        .ad-box { background: #fff; margin: 20px; padding: 20px; display: inline-block; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); vertical-align: top; }
        .label { display: block; margin-bottom: 12px; font-weight: bold; color: #333; font-size: 14px; }
        iframe { border: 1px solid #eee; background: #fff; display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <h1>Campaign Preview: Marketron</h1>

     <div class="ad-box">
        <span class="label">160x600</span>
        <iframe src="160x600/index.html" width="160" height="600" scrolling="no"></iframe>
    </div>

     <div class="ad-box">
        <span class="label">300x250</span>
        <iframe src="300x250/index.html" width="300" height="250" scrolling="no"></iframe>
    </div>

    <div class="ad-box">
        <span class="label">300x600</span>
        <iframe src="300x600/index.html" width="300" height="600" scrolling="no"></iframe>
    </div>

    <div class="ad-box">
        <span class="label">728x90</span>
        <iframe src="728x90/index.html" width="728" height="90" scrolling="no"></iframe>
    </div>

    <div class="ad-box">
        <span class="label">300x50</span>
        <iframe src="300x50/index.html" width="300" height="50" scrolling="no"></iframe>
    </div>

    <div class="ad-box">
        <span class="label">320x50</span>
        <iframe src="320x50/index.html" width="320" height="50" scrolling="no"></iframe>
    </div>

</body>
</html>
